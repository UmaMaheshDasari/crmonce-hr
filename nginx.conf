# /etc/nginx/sites-available/hr-system
# Symlink: ln -s /etc/nginx/sites-available/hr-system /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hr.crmonce.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name hr.crmonce.com;

    # SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/hr.crmonce.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hr.crmonce.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── React frontend (static files) ─────────────────────────
    root /var/www/hr-system/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Long cache for hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Node.js API (reverse proxy) ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # ── Socket.io ─────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Uploaded files ────────────────────────────────────────
    location /uploads/ {
        alias /var/www/hr-system/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        # Security: only allow safe file types
        location ~* \.(php|php5|phtml|cgi|pl|py|rb)$ { deny all; }
    }

    # Block hidden files
    location ~ /\. { deny all; }

}
